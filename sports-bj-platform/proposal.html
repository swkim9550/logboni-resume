<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPOTV NOW CAST — 기획 제안서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#141416;--bg2:#1a1a1e;--bg3:#222226;--mint:#2affcc;--mint-dim:rgba(42,255,204,.12);--red:#ff3b30;--blue:#2771ff;--t1:#fff;--t2:#ededed;--t3:#a0a0a0;--t4:#6a6a6a;--t5:#494949;--border:rgba(255,255,255,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t2);min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:rgba(20,20,22,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.header .logo{display:flex;align-items:center;gap:10px}
.header .logo img{height:24px}
.header .logo .cb{font-size:11px;font-weight:800;color:var(--mint);background:var(--mint-dim);padding:2px 8px;border-radius:12px}
.header .meta{font-size:12px;color:var(--t4);margin-left:16px}
.header .actions{display:flex;gap:8px}
.header .actions button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--t3);font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;cursor:pointer;transition:all .2s;font-family:inherit}
.header .actions button:hover{background:rgba(255,255,255,.12)}
.header .actions button.primary{background:var(--mint-dim);border-color:rgba(42,255,204,.2);color:var(--mint)}
.header .actions button.primary:hover{background:rgba(42,255,204,.2)}
.toc{position:fixed;left:0;top:53px;width:240px;height:calc(100vh - 53px);overflow-y:auto;padding:20px 16px;border-right:1px solid var(--border);background:rgba(20,20,22,.98)}
.toc::-webkit-scrollbar{width:3px}
.toc::-webkit-scrollbar-thumb{background:rgba(42,255,204,.15);border-radius:3px}
.toc .toc-title{font-size:10px;color:var(--t5);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.toc a{display:block;font-size:12px;color:var(--t4);text-decoration:none;padding:6px 10px;border-radius:8px;margin-bottom:2px;transition:all .15s;line-height:1.4}
.toc a:hover{color:var(--t2);background:rgba(255,255,255,.04)}
.toc a.active{color:var(--mint);background:var(--mint-dim);font-weight:600}
.toc a.h3{padding-left:24px;font-size:11px;color:var(--t5)}
.content{margin-left:240px;max-width:820px;padding:40px 48px 120px}
.md h1{font-size:28px;font-weight:900;color:var(--t1);margin:48px 0 16px;letter-spacing:-.5px;padding-bottom:12px;border-bottom:2px solid rgba(42,255,204,.15)}
.md h1:first-child{margin-top:0}
.md h2{font-size:20px;font-weight:800;color:var(--t1);margin:40px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.md h3{font-size:16px;font-weight:700;color:var(--mint);margin:28px 0 10px}
.md p{font-size:14px;line-height:1.9;margin-bottom:12px;color:var(--t3)}
.md strong{color:var(--t1)}
.md em{color:var(--mint);font-style:normal}
.md hr{border:none;border-top:1px solid var(--border);margin:32px 0}
.md ul,.md ol{padding-left:20px;margin:8px 0 16px}
.md li{font-size:14px;line-height:1.8;margin-bottom:6px;color:var(--t3)}
.md li strong{color:var(--t1)}
.md code{background:var(--mint-dim);color:var(--mint);padding:2px 7px;border-radius:4px;font-size:13px;font-family:'SF Mono',Consolas,monospace}
.md pre{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin:12px 0 20px;overflow-x:auto}
.md pre code{background:none;color:var(--t2);padding:0;font-size:13px}
.md table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:13px}
.md th{text-align:left;padding:10px 14px;background:var(--mint-dim);color:var(--mint);font-weight:700;border:1px solid var(--border)}
.md td{padding:10px 14px;border:1px solid rgba(255,255,255,.04);color:var(--t3)}
.md tr:hover td{background:rgba(255,255,255,.02)}
.md blockquote{border-left:3px solid var(--mint);padding:8px 16px;margin:12px 0;background:rgba(42,255,204,.03);border-radius:0 8px 8px 0}
.md blockquote p{color:var(--t4);margin:0;font-size:13px}
@media(max-width:768px){.toc{display:none}.content{margin-left:0;padding:24px 20px 80px}.md h1{font-size:22px}.md h2{font-size:17px}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center">
    <div class="logo">
      <img src="https://cdn.spotvnow.co.kr/dist/asset/now-logo-for-sns.png" alt="SPOTV NOW">
      <span class="cb">CAST</span>
    </div>
    <div class="meta">기획 제안서 · 2026.04</div>
  </div>
  <div class="actions">
    <button onclick="window.print()">🖨️ 인쇄</button>
    <button class="primary" onclick="location.href='index.html'">🎙️ 데모 보기</button>
  </div>
</div>
<nav class="toc" id="toc"><div class="toc-title">목차</div></nav>
<div class="content"><div class="md" id="md">로딩 중...</div></div>
<script>
function buildToc(container){
  const toc=document.getElementById('toc');
  container.querySelectorAll('h1,h2,h3').forEach(h=>{
    const a=document.createElement('a');
    a.textContent=h.textContent;a.href='#'+(h.id||'');
    if(h.tagName==='H3')a.className='h3';
    a.onclick=e=>{e.preventDefault();h.scrollIntoView({behavior:'smooth',block:'start'})};
    toc.appendChild(a);
  });
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){
      toc.querySelectorAll('a').forEach(a=>a.classList.remove('active'));
      const l=toc.querySelector(`a[href="#${e.target.id}"]`);if(l)l.classList.add('active');
    }});
  },{rootMargin:'-80px 0px -70% 0px'});
  container.querySelectorAll('h1[id],h2[id],h3[id]').forEach(h=>obs.observe(h));
}
function fmt(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')}
function slug(s){return s.replace(/[^a-zA-Z0-9가-힣 ]/g,'').trim().replace(/\s+/g,'-')}
fetch('proposal.md').then(r=>r.text()).then(md=>{
  const c=document.getElementById('md'),lines=md.split('\n');
  let r='',inT=false,tR=[],inC=false,cB='';
  lines.forEach(l=>{
    if(l.trim().startsWith('```')){if(inC){r+='<pre><code>'+cB.replace(/</g,'&lt;')+'</code></pre>\n';cB=''}inC=!inC;return}
    if(inC){cB+=l+'\n';return}
    const isTL=l.trim().startsWith('|')&&l.trim().endsWith('|');
    if(isTL){const cells=l.split('|').filter(c=>c.trim()!=='');if(cells.every(c=>/^[\s\-:]+$/.test(c)))return;if(!inT){inT=true;tR=[]}tR.push(cells.map(c=>c.trim()))}
    else{if(inT){r+='<table>';tR.forEach((row,i)=>{const t=i===0?'th':'td';r+='<tr>'+row.map(c=>`<${t}>${fmt(c)}</${t}>`).join('')+'</tr>'});r+='</table>';inT=false;tR=[]}
    let o=l;
    if(/^### (.+)$/.test(o))o=o.replace(/^### (.+)$/,(m,t)=>`<h3 id="${slug(t)}">${fmt(t)}</h3>`);
    else if(/^## (.+)$/.test(o))o=o.replace(/^## (.+)$/,(m,t)=>`<h2 id="${slug(t)}">${fmt(t)}</h2>`);
    else if(/^# (.+)$/.test(o))o=o.replace(/^# (.+)$/,(m,t)=>`<h1 id="${slug(t)}">${fmt(t)}</h1>`);
    else if(/^> (.+)$/.test(o))o='<blockquote><p>'+o.replace(/^> /,'')+'</p></blockquote>';
    else if(/^---$/.test(o.trim()))o='<hr>';
    else if(/^- (.+)$/.test(o))o='<li>'+fmt(o.replace(/^- /,''))+'</li>';
    else if(/^\d+\. (.+)$/.test(o))o='<li>'+fmt(o.replace(/^\d+\. /,''))+'</li>';
    else if(o.trim())o='<p>'+fmt(o)+'</p>';else o='';
    r+=o+'\n'}
  });
  if(inT){r+='<table>';tR.forEach((row,i)=>{const t=i===0?'th':'td';r+='<tr>'+row.map(c=>`<${t}>${fmt(c)}</${t}>`).join('')+'</tr>'});r+='</table>'}
  r=r.replace(/(<li>.*?<\/li>\n?)+/g,'<ul>$&</ul>');
  c.innerHTML=r;buildToc(c);
}).catch(()=>{document.getElementById('md').innerHTML='<p style="color:var(--t4)">proposal.md를 로드할 수 없습니다.<br><code>python3 -m http.server 8080</code>으로 열어주세요.</p>'});
</script>
</body>
</html>
