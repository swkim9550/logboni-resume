<script>
function buildToc(container){
  const toc=document.getElementById('toc');
  container.querySelectorAll('h1,h2,h3').forEach(h=>{
    const a=document.createElement('a');
    a.textContent=h.textContent;a.href='#'+(h.id||'');
    if(h.tagName==='H3')a.className='h3';
    a.onclick=e=>{e.preventDefault();h.scrollIntoView({behavior:'smooth',block:'start'})};
    toc.appendChild(a);
  });
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){
      toc.querySelectorAll('a').forEach(a=>a.classList.remove('active'));
      const l=toc.querySelector(`a[href="#${e.target.id}"]`);if(l)l.classList.add('active');
    }});
  },{rootMargin:'-80px 0px -70% 0px'});
  container.querySelectorAll('h1[id],h2[id],h3[id]').forEach(h=>obs.observe(h));
}
function fmt(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')}
function slug(s){return s.replace(/[^a-zA-Z0-9가-힣 ]/g,'').trim().replace(/\s+/g,'-')}
fetch('proposal.md').then(r=>r.text()).then(md=>{
  parseMd(md);
}).catch(()=>{
  // fallback: 인라인 MD
  const el=document.getElementById('md-source');
  if(el){parseMd(el.textContent);}
  else{document.getElementById('md').innerHTML='<p style="color:var(--t4)">proposal.md를 로드할 수 없습니다.</p>';}
});
function parseMd(md){
  const c=document.getElementById('md'),lines=md.split('\n');
  let r='',inT=false,tR=[],inC=false,cB='';
  lines.forEach(l=>{
    if(l.trim().startsWith('```')){if(inC){r+='<pre><code>'+cB.replace(/</g,'&lt;')+'</code></pre>\n';cB=''}inC=!inC;return}
    if(inC){cB+=l+'\n';return}
    const isTL=l.trim().startsWith('|')&&l.trim().endsWith('|');
    if(isTL){const cells=l.split('|').filter(c=>c.trim()!=='');if(cells.every(c=>/^[\s\-:]+$/.test(c)))return;if(!inT){inT=true;tR=[]}tR.push(cells.map(c=>c.trim()))}
    else{if(inT){r+='<table>';tR.forEach((row,i)=>{const t=i===0?'th':'td';r+='<tr>'+row.map(c=>`<${t}>${fmt(c)}</${t}>`).join('')+'</tr>'});r+='</table>';inT=false;tR=[]}
    let o=l;
    if(/^### (.+)$/.test(o))o=o.replace(/^### (.+)$/,(m,t)=>`<h3 id="${slug(t)}">${fmt(t)}</h3>`);
    else if(/^## (.+)$/.test(o))o=o.replace(/^## (.+)$/,(m,t)=>`<h2 id="${slug(t)}">${fmt(t)}</h2>`);
    else if(/^# (.+)$/.test(o))o=o.replace(/^# (.+)$/,(m,t)=>`<h1 id="${slug(t)}">${fmt(t)}</h1>`);
    else if(/^> (.+)$/.test(o))o='<blockquote><p>'+o.replace(/^> /,'')+'</p></blockquote>';
    else if(/^---$/.test(o.trim()))o='<hr>';
    else if(/^- (.+)$/.test(o))o='<li>'+fmt(o.replace(/^- /,''))+'</li>';
    else if(/^\d+\. (.+)$/.test(o))o='<li>'+fmt(o.replace(/^\d+\. /,''))+'</li>';
    else if(o.trim())o='<p>'+fmt(o)+'</p>';else o='';
    r+=o+'\n'}
  });
  if(inT){r+='<table>';tR.forEach((row,i)=>{const t=i===0?'th':'td';r+='<tr>'+row.map(c=>`<${t}>${fmt(c)}</${t}>`).join('')+'</tr>'});r+='</table>'}
  r=r.replace(/(<li>.*?<\/li>\n?)+/g,'<ul>$&</ul>');
  c.innerHTML=r;buildToc(c);
}
</script>

# SPOTV NOW CAST — 모든 스포츠를 캐스트하다

> 작성일: 2026-04-28 · 아이디어 v2

---

## 핵심 컨셉

**스포츠 전문 캐스터와 시청자가 함께 만드는 라이브 스포츠 플랫폼.**

축구·야구 중계만이 아니다. 러닝, 요가, 피트니스, 복싱, 클라이밍 — 모든 스포츠 분야의 전문가가 캐스터가 되고, 시청자가 함께 참여하는 구조.

- **관전형**: 축구·야구·농구 등 경기 해설/예측 캐스트
- **참여형**: 러닝·요가·피트니스·복싱 등 시청자와 함께하는 라이브
- **교육형**: 전술 분석, 규칙 입문, 운동 과학 강의

---

## 왜 이 방향인가

### 기존 한계
- 축구·야구 중계 해설에 국한 → 타겟이 코어 팬으로 제한
- 경기 없는 시간에 콘텐츠 없음
- 중계권 의존 구조 여전

### v2 확장
- **경기 없어도 콘텐츠가 돌아감** — 러닝 캐스터가 매일 아침, 요가 캐스터가 매일 저녁
- **시청자가 참여자가 됨** — 같이 운동하고, 같이 뛰고, 같이 배움
- **중계권 의존도 제로** — 참여형/교육형은 중계권 불필요
- **타겟 확장** — 코어 팬 + 운동하는 모든 사람

---

## 캐스트 카테고리

### 관전형 (Watch)

| 카테고리 | 특징 |
|----------|------|
| ⚽ 해외축구 | 중계권 보유 시 영상+해설, 미보유 시 토크 |
| ⚾ 야구 (MLB/KBO/NPB) | 데이터 분석, 이닝별 예측 |
| 🏀 농구 (NBA/KBL) | 전술 분석, 쿼터별 예측 |
| 🥊 격투기 (UFC/복싱) | 라운드별 예측 |
| 🎮 e스포츠 | 팀 분석, 밴픽 예측 |

### 참여형 (Join)

| 카테고리 | 특징 |
|----------|------|
| 🏃 러닝 | 캐스터와 동시에 달리기, GPS 연동 |
| 🧘 요가 | 실시간 자세 가이드 |
| 💪 피트니스 | 홈트, HIIT, 세트 카운트 |
| 🥊 복싱 피트니스 | 라운드별 따라하기 |
| 🧗 클라이밍 | 실시간 도전 공유 |
| 🚴 사이클 | 실내 사이클, 라이딩 라이브 |

### 교육형 (Learn)

| 카테고리 | 특징 |
|----------|------|
| 📊 전술 분석 | 축구 전술, 야구 데이터 분석 강의 |
| 📏 규칙 입문 | 오프사이드란?, 야구 규칙 101 |
| 🏋️ 운동 과학 | 근비대 원리, 러닝 폼 교정 |

**월 예상 수익 (초기, 캐스터 70명 기준): 약 7,700만원+**

## 법적 검토

- **관전형**: 중계권 보유 시 자사 영상 활용 OK. 미보유 시 토크만 → 법적 문제 낮음
- **참여형/교육형**: 중계권 이슈 없음. 캐스터 본인 콘텐츠
- 음악 저작권, 운동 중 부상 면책 조항 필요

| **NOW CAST** | **관전+참여+교육 통합, 공식 영상 연동** |

**"스포츠를 보는 곳"에서 "스포츠를 하는 곳"으로.** NOW CAST는 SPOTV NOW를 모든 스포츠를 즐기는 플랫폼으로 진화시킨다.
