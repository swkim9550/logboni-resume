<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPOTV NOW Audio - 기획 제안서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0a0a0a;color:#ddd;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.header .logo{font-size:16px;font-weight:900;letter-spacing:-0.5px}
.header .logo .now{color:#e83f3f}
.header .logo .audio{color:#fff;font-size:11px;font-weight:600;background:rgba(232,63,63,.2);padding:2px 8px;border-radius:12px;margin-left:6px;vertical-align:middle}
.header .meta{font-size:12px;color:#666}
.header .actions{display:flex;gap:8px}
.header .actions button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#ccc;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;cursor:pointer;transition:all .2s;font-family:inherit}
.header .actions button:hover{background:rgba(255,255,255,.12)}
.header .actions button.primary{background:rgba(232,63,63,.15);border-color:rgba(232,63,63,.3);color:#e83f3f}
.header .actions button.primary:hover{background:rgba(232,63,63,.25)}
.toc{position:fixed;left:0;top:53px;width:240px;height:calc(100vh - 53px);overflow-y:auto;padding:20px 16px;border-right:1px solid rgba(255,255,255,.06);background:rgba(10,10,10,.98)}
.toc::-webkit-scrollbar{width:3px}
.toc::-webkit-scrollbar-thumb{background:rgba(232,63,63,.2);border-radius:3px}
.toc .toc-title{font-size:10px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.toc a{display:block;font-size:12px;color:#777;text-decoration:none;padding:6px 10px;border-radius:8px;margin-bottom:2px;transition:all .15s;line-height:1.4}
.toc a:hover{color:#ccc;background:rgba(255,255,255,.04)}
.toc a.active{color:#e83f3f;background:rgba(232,63,63,.08);font-weight:600}
.toc a.h3{padding-left:24px;font-size:11px;color:#555}
.toc a.h3:hover{color:#999}
.content{margin-left:240px;max-width:820px;padding:40px 48px 120px}
.md h1{font-size:28px;font-weight:900;color:#fff;margin:48px 0 16px;letter-spacing:-0.5px;padding-bottom:12px;border-bottom:2px solid rgba(232,63,63,.2)}
.md h1:first-child{margin-top:0}
.md h2{font-size:20px;font-weight:800;color:#fff;margin:40px 0 12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.md h3{font-size:16px;font-weight:700;color:#e83f3f;margin:28px 0 10px}
.md p{font-size:14px;line-height:1.9;margin-bottom:12px;color:#bbb}
.md strong{color:#fff}
.md em{color:#e83f3f;font-style:normal}
.md a{color:#e83f3f;text-decoration:none;border-bottom:1px solid rgba(232,63,63,.3)}
.md hr{border:none;border-top:1px solid rgba(255,255,255,.06);margin:32px 0}
.md ul,.md ol{padding-left:20px;margin:8px 0 16px}
.md li{font-size:14px;line-height:1.8;margin-bottom:6px;color:#bbb}
.md li strong{color:#fff}
.md code{background:rgba(232,63,63,.08);color:#e83f3f;padding:2px 7px;border-radius:4px;font-size:13px;font-family:'SF Mono',Consolas,monospace}
.md pre{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px 20px;margin:12px 0 20px;overflow-x:auto}
.md pre code{background:none;color:#ccc;padding:0;font-size:13px}
.md table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:13px}
.md th{text-align:left;padding:10px 14px;background:rgba(232,63,63,.06);color:#e83f3f;font-weight:700;border:1px solid rgba(255,255,255,.06)}
.md td{padding:10px 14px;border:1px solid rgba(255,255,255,.04);color:#bbb}
.md tr:hover td{background:rgba(255,255,255,.02)}
.md blockquote{border-left:3px solid #e83f3f;padding:8px 16px;margin:12px 0;background:rgba(232,63,63,.04);border-radius:0 8px 8px 0}
.md blockquote p{color:#999;margin:0;font-size:13px}
@media(max-width:768px){
  .toc{display:none}
  .content{margin-left:0;padding:24px 20px 80px}
  .md h1{font-size:22px}
  .md h2{font-size:17px}
}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:20px">
    <div class="logo">SPOTV <span class="now">NOW</span> <span class="audio">AUDIO</span></div>
    <div class="meta">기획 제안서 · 2026.03</div>
  </div>
  <div class="actions">
    <button onclick="window.print()">🖨️ 인쇄</button>
    <button onclick="location.href='evidence.html'">📊 근거 자료</button>
    <button class="primary" onclick="location.href='index.html'">🎧 MVP 데모</button>
  </div>
</div>
<nav class="toc" id="toc"><div class="toc-title">목차</div></nav>
<div class="content"><div class="md" id="md">로딩 중...</div></div>

<script>
function parseMd(md) {
  let html = md
    .replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3 id="$1">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 id="$1">$1</h2>')
    .replace(/^# (.+)$/gm, '<h1 id="$1">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^\- (.+)$/gm, '• $1')
    .replace(/(• .+\n?)+/g, m => '<ul>' + m.replace(/• (.+)/g, '<li>$1</li>') + '</ul>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\|(.+)\|/g, function(m) {
      const cells = m.split('|').filter(c => c.trim());
      if (cells.every(c => /^[\s\-:]+$/.test(c))) return '';
      return '<tr>' + cells.map(c => {
        const v = c.trim();
        const tag = /^[\s\-:]+$/.test(v) ? null : (m === md.split('\n').find(l => l === m) ? 'td' : 'td');
        return tag ? `<td>${v}</td>` : '';
      }).join('') + '</tr>';
    });

  // table wrapper
  const lines = md.split('\n');
  let inTable = false;
  let result = '';
  let tableRows = [];

  lines.forEach(line => {
    const isTableLine = line.trim().startsWith('|') && line.trim().endsWith('|');
    if (isTableLine) {
      const cells = line.split('|').filter(c => c.trim());
      if (cells.every(c => /^[\s\-:]+$/.test(c))) { return; }
      if (!inTable) { inTable = true; tableRows = []; }
      tableRows.push(cells.map(c => c.trim()));
    } else {
      if (inTable) {
        result += '<table>';
        tableRows.forEach((row, i) => {
          const tag = i === 0 ? 'th' : 'td';
          result += '<tr>' + row.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
        });
        result += '</table>';
        inTable = false;
        tableRows = [];
      }
      // normal line
      let l = line
        .replace(/^#### (.+)$/, '<h4>$1</h4>')
        .replace(/^### (.+)$/, (m, t) => `<h3 id="${t.replace(/[^a-zA-Z0-9가-힣 ]/g,'').trim()}">${t}</h3>`)
        .replace(/^## (.+)$/, (m, t) => `<h2 id="${t.replace(/[^a-zA-Z0-9가-힣 ]/g,'').trim()}">${t}</h2>`)
        .replace(/^# (.+)$/, (m, t) => `<h1 id="${t.replace(/[^a-zA-Z0-9가-힣 ]/g,'').trim()}">${t}</h1>`)
        .replace(/^> (.+)$/, '<blockquote><p>$1</p></blockquote>')
        .replace(/^---$/, '<hr>')
        .replace(/^- (.+)$/, '<li>$1</li>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>');
      result += l + '\n';
    }
  });
  if (inTable) {
    result += '<table>';
    tableRows.forEach((row, i) => {
      const tag = i === 0 ? 'th' : 'td';
      result += '<tr>' + row.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
    });
    result += '</table>';
  }

  // wrap consecutive <li> in <ul>
  result = result.replace(/(<li>.*?<\/li>\n?)+/g, '<ul>$&</ul>');
  // wrap bare text in <p>
  result = result.replace(/^(?!<[hupltbod]|<\/|<br|<hr|<block|<code|<pre|<ul|<li)(.+)$/gm, '<p>$1</p>');
  return result;
}

function buildToc(container) {
  const toc = document.getElementById('toc');
  const headings = container.querySelectorAll('h1,h2,h3');
  headings.forEach(h => {
    const a = document.createElement('a');
    a.textContent = h.textContent;
    a.href = '#' + (h.id || '');
    if (h.tagName === 'H3') a.className = 'h3';
    a.onclick = e => { e.preventDefault(); h.scrollIntoView({behavior:'smooth',block:'start'}); };
    toc.appendChild(a);
  });

  // scroll spy
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        toc.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        const link = toc.querySelector(`a[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, {rootMargin:'-80px 0px -70% 0px'});
  headings.forEach(h => { if(h.id) observer.observe(h); });
}

fetch('proposal.md').then(r => r.text()).then(md => {
  const container = document.getElementById('md');
  container.innerHTML = parseMd(md);
  buildToc(container);
}).catch(() => {
  // fallback: inline
  document.getElementById('md').innerHTML = '<p style="color:#888">proposal.md 파일을 로드할 수 없습니다. 로컬 서버로 열어주세요:<br><code>cd audio-sports && python3 -m http.server 8080</code></p>';
});
</script>
</body>
</html>
